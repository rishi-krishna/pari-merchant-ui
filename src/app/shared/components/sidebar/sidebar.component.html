<aside
  class="sidebar"
  [class.mobile]="mobile()"
  [class.mobile-open]="mobile() && open()"
  [class.sidebar--collapsed]="collapsed()"
>
  <div class="sidebar__brand">
    <div class="sidebar__brand-mark">P</div>
    <div class="sidebar__brand-copy">
      <strong>Pari</strong>
      <span>Payments Workspace</span>
    </div>
  </div>

  <nav class="sidebar__nav">
    @for (section of sections; track section.heading ?? $index) {
      @if (section.heading) {
        <p class="sidebar__heading">{{ section.heading }}</p>
      }

      <div class="sidebar__items">
        @for (item of section.items; track item.route) {
          <a
            class="sidebar__item"
            [routerLink]="item.route"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
            (click)="onSelect()"
            [attr.title]="collapsed() ? item.label : null"
          >
            <app-icon [name]="item.icon" [size]="18"></app-icon>
            <span class="sidebar__item-label">{{ item.label }}</span>
          </a>
        }
      </div>
    }
  </nav>
</aside>

<div class="portal-shell">
  <app-header></app-header>

  <div class="portal-shell__body">
    <app-sidebar [mobile]="isMobile()" [open]="mobileSidebarOpen()" (itemSelected)="closeSidebar()"></app-sidebar>

    @if (isMobile() && mobileSidebarOpen()) {
      <button class="portal-shell__scrim" type="button" (click)="closeSidebar()" aria-label="Close sidebar"></button>
    }

    <div class="portal-shell__main">
      <div class="portal-shell__breadcrumb">
        <button class="portal-shell__menu-button" type="button" (click)="toggleSidebar()">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="portal-shell__crumbs">
          @for (crumb of breadcrumbs(); track crumb; let last = $last) {
            <span [class.portal-shell__crumb--current]="last">{{ crumb }}</span>
            @if (!last) {
              <span class="portal-shell__crumb-separator">/</span>
            }
          }
        </div>
      </div>

      <main class="portal-shell__content">
        <router-outlet></router-outlet>
      </main>

      <footer class="portal-shell__footer">
        <span>Copyright © 2026 SLPE. All rights reserved.</span>
      </footer>
    </div>
  </div>
</div>
